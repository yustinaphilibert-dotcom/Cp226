<!DOCTYPE html>
<html>
<head>
    <title>Formatting Tags</title>
</head>
<body>

    <h2>HTML Text Formatting Tags</h2>

    <table border="1">
        <tr>
            <th>Tags</th>
            <th>Example</th>
        </tr>

        <tr>
            <td>Bold</td>
            <td><b>This is bold</b></td>
        </tr>

        <tr>
            <td>Italic</td>
            <td><i>This is italic</i></td>
        </tr>

        <tr>
            <td>Underline</td>
            <td><u>This is underlined</u></td>
        </tr>

        <tr>
            <td>Mark</td>
            <td><mark>Highlighted</mark></td>
        </tr>
        </table>

        </body>
        </html>
